[tools]
hyperfine = "latest"
rust = { version = "1.96.0", components = "clippy,rustfmt" }
fd = "latest"

[env]
RUST_BACKTRACE = "1"

[tasks.clean]
description = "Remove build artifacts and all untracked/ignored files"
run = [
  "cargo clean",
  "git clean -f -x -d",
]

[tasks."build:install"]
description = "Build release and install rgx to ~/.local/bin"
run = '''
cargo build --release
mkdir -p "$HOME/.local/bin"
install ./target/release/rgx "$HOME/.local/bin/rgx"
case ":$PATH:" in
  *":$HOME/.local/bin:"*) ;;
  *) echo "warning: $HOME/.local/bin is not in PATH" >&2 ;;
esac
'''

[tasks.run]
description = "Run rgx (pass args after --)"
run = "cargo run --"

[tasks.test]
description = "Run the test suite"
run = "cargo test"

[tasks.fmt]
description = "Format all code"
run = "cargo fmt --all"

[tasks.fmt-check]
description = "Check formatting without modifying files"
run = "cargo fmt --all -- --check"

[tasks.lint]
description = "Lint with clippy, warnings as errors"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.fix]
description = "Auto-fix clippy lints and formatting"
run = [
  "cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged",
  "cargo fmt --all",
]

[tasks.ci]
description = "Format check, lint, and test"
depends = ["fmt-check", "lint", "test"]
