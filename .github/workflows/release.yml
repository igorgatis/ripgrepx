name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # A tag push does not create a GitHub Release, so make one first; the upload jobs attach to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

  upload:
    needs: create-release
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # Builds with --release, archives the `rgx` binary (.tar.gz on unix, .zip on windows),
      # installs the target / uses cross for non-native ones, and uploads to the tag's release.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: rgx
          target: ${{ matrix.target }}
          archive: rgx-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish the `ripgrepx` npm package (its postinstall downloads the matching binary from this
  # release). Skipped automatically until an NPM_TOKEN secret is set.
  npm:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - name: Publish ripgrepx
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret not set - skipping npm publish."
            exit 0
          fi
          cd npm
          npm version "${TAG#v}" --no-git-tag-version --allow-same-version
          npm publish --access public

  # Publish the source crate to crates.io (`cargo install ripgrepx`). Independent of the binaries.
  # Skipped automatically until a CARGO_REGISTRY_TOKEN secret is set. Cargo.toml version must equal
  # the tag (bump it before tagging).
  crates-io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set - skipping crates.io publish."
            exit 0
          fi
          cargo publish --locked

  # Build one wheel per platform that bundles the rgx binary (`pip install ripgrepx`). Enable by
  # setting the repo variable PUBLISH_PYPI=true and configuring PyPI Trusted Publishing for this repo.
  pypi-build:
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    name: pypi ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  pypi-publish:
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    needs: pypi-build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC) — no API token needed
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
